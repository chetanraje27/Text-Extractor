<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Extractor - OCR & PDF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .upload-section {
            margin-bottom: 40px;
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .drop-zone:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        .drop-zone.dragover {
            border-color: #764ba2;
            background: #e8eaff;
            transform: scale(1.02);
        }

        .drop-zone-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .drop-zone h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .drop-zone p {
            color: #666;
            margin-bottom: 15px;
        }

        .file-input {
            display: none;
        }

        .btn-browse {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s;
        }

        .btn-browse:hover {
            transform: translateY(-2px);
        }

        .supported-formats {
            margin-top: 20px;
            padding: 15px;
            background: #f0f1ff;
            border-radius: 8px;
            color: #666;
            font-size: 0.95em;
        }

        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .file-info {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .file-info h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .file-info p {
            color: #666;
        }

        .extracted-text-container {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .extracted-text-header {
            background: #f8f9ff;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .extracted-text-header h3 {
            color: #333;
        }

        .btn-copy {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .btn-copy:hover {
            background: #764ba2;
        }

        .btn-copy.copied {
            background: #28a745;
        }

        .extracted-text {
            padding: 20px;
            color: #333;
            line-height: 1.6;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .error-message {
            display: none;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-reset {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background: #5a6268;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 20px;
            }

            .drop-zone {
                padding: 30px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .extracted-text {
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Text Extractor</h1>
            <p>Extract text from images and PDFs instantly</p>
        </div>

        <div class="content">
            <!-- Error Message -->
            <div class="error-message" id="errorMessage"></div>

            <!-- Upload Section -->
            <div class="upload-section" id="uploadSection">
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-icon">📁</div>
                    <h2>Drop your file here</h2>
                    <p>or click to browse</p>
                    <button class="btn-browse" onclick="document.getElementById('fileInput').click()">
                        Choose File
                    </button>
                    <input
                        type="file"
                        id="fileInput"
                        class="file-input"
                        accept=".pdf,.png,.jpg,.jpeg,.gif,.bmp,.tiff,.webp"
                    />
                    <div class="supported-formats">
                        ✓ Supported: PDF, PNG, JPG, JPEG, GIF, BMP, TIFF, WEBP
                    </div>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Extracting text from your file...</p>
            </div>

            <!-- Results Section -->
            <div class="results-section" id="resultsSection">
                <div class="file-info">
                    <h3>📋 File Information</h3>
                    <p>File: <strong id="fileName"></strong></p>
                    <p>Size: <strong id="fileSize"></strong></p>
                </div>

                <div class="extracted-text-container">
                    <div class="extracted-text-header">
                        <h3>✨ Extracted Text</h3>
                        <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">
                            📋 Copy
                        </button>
                    </div>
                    <div class="extracted-text" id="extractedText"></div>
                </div>

                <div class="action-buttons">
                    <button class="btn-reset" onclick="resetForm()">Upload Another File</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadSection = document.getElementById('uploadSection');
        const resultsSection = document.getElementById('resultsSection');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');

        // Drag and drop handlers
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            errorMessage.classList.remove('show');

            // Validate file type
            const allowedTypes = ['application/pdf', 'image/png', 'image/jpeg', 'image/gif', 'image/bmp', 'image/tiff', 'image/webp'];
            if (!allowedTypes.includes(file.type) && !file.name.toLowerCase().endsWith('.pdf')) {
                showError('Invalid file type. Please upload a PDF or image.');
                return;
            }

            // File size limit (50MB)
            if (file.size > 50 * 1024 * 1024) {
                showError('File too large. Maximum size is 50MB.');
                return;
            }

            uploadFile(file);
        }

        async function uploadFile(file) {
            uploadSection.style.display = 'none';
            loading.classList.add('show');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/extract/', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (!response.ok) {
                    showError(result.error || 'Failed to extract text');
                    return;
                }

                displayResults(file, result.text);
            } catch (error) {
                showError('Error uploading file: ' + error.message);
            } finally {
                loading.classList.remove('show');
            }
        }

        function displayResults(file, text) {
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatFileSize(file.size);
            document.getElementById('extractedText').textContent = text || '(No text extracted)';

            uploadSection.style.display = 'none';
            resultsSection.classList.add('active');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.add('show');
            uploadSection.style.display = 'block';
            loading.classList.remove('show');
            resultsSection.classList.remove('active');
        }

        function copyToClipboard() {
            const text = document.getElementById('extractedText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✓ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function resetForm() {
            uploadSection.style.display = 'block';
            resultsSection.classList.remove('active');
            fileInput.value = '';
            errorMessage.classList.remove('show');
        }
    </script>
</body>
</html>
